<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <style>
    .bg   { fill: #F8F4ED; }
    .mark { fill: #1A2B4A; }
    .beam { fill: #1A2B4A; opacity: 0.18; }
    @media (prefers-color-scheme: dark) {
      .bg   { fill: #1A2B4A; }
      .mark { fill: #B08D57; }
      .beam { fill: #B08D57; opacity: 0.28; }
    }
  </style>

  <!-- Rounded-square background -->
  <rect width="64" height="64" rx="10" class="bg"/>

  <!--
    Beam: single triangular wedge, apex at right edge of lantern room,
    centerline ~30° above horizontal, spanning ±15°.
    From (38,26) → upper (56,8) at 42° → lower (56,21) at 15°.
  -->
  <polygon points="38,26 56,8 56,21" class="beam"/>

  <!-- Dome cap — isoceles triangle above lantern -->
  <polygon points="32,14 26,22 38,22" class="mark"/>

  <!-- Lantern room — square sitting on body -->
  <rect x="26" y="22" width="12" height="8" class="mark"/>

  <!-- Tower body — tapered trapezoid, wider at base -->
  <polygon points="21,54 43,54 38,30 26,30" class="mark"/>
</svg>
