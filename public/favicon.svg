<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="geometricPrecision">
  <!-- Navy rounded-square background -->
  <rect width="32" height="32" rx="7" fill="#1A2B4A"/>

  <!-- Brass light beams from lantern top -->
  <line x1="16" y1="11" x2="3"  y2="1"  stroke="#B08D57" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="11" x2="16" y2="1"  stroke="#B08D57" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="11" x2="29" y2="1"  stroke="#B08D57" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Cap (pointed roof) -->
  <polygon points="16,5 10,11 22,11" fill="#F8F4ED"/>

  <!-- Lantern room -->
  <rect x="10" y="11" width="12" height="6" rx="1" fill="#C45A3D"/>

  <!-- Light glow inside lantern -->
  <circle cx="16" cy="14" r="2.5" fill="#F8F4ED" opacity="0.3"/>

  <!-- Tower body -->
  <rect x="12" y="17" width="8" height="10" fill="#F8F4ED"/>

  <!-- Horizontal band on tower (adds detail at larger sizes) -->
  <rect x="12" y="21.5" width="8" height="1.5" fill="#C45A3D" opacity="0.35"/>

  <!-- Base platform -->
  <rect x="8" y="27" width="16" height="4" rx="2" fill="#F8F4ED"/>
</svg>
